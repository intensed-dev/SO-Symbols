name: Bug Report
description: Report an issue with San Orien Symbols.
title: "[Bug]: "
labels:

* bug

body:

* type: markdown
  attributes:
  value: |
  Thank you for helping improve San Orien Symbols.

* type: input
  id: icon
  attributes:
  label: Icon
  placeholder: home

* type: textarea
  id: description
  attributes:
  label: Description

* type: textarea
  id: reproduction
  attributes:
  label: Steps to reproduce

* type: textarea
  id: expected
  attributes:
  label: Expected behavior

* type: dropdown
  id: severity
  attributes:
  label: Severity
  options:
  - Low
  - Medium
  - High
  - Critical
